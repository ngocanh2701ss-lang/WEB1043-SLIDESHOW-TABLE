<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #slide{
            width: 500px;
            height: 300px;
            object-fit: cover;
            display: cover;
            display: block;
            
            margin: 0 auto 20px auto;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            margin-bottom: 10px;
            text-align: center;
        }
        button:hover{
            transform: translateY(-3px);
            box-shadow: 0 60px 12px rgba(0, 0, 0, 0.2);
            opacity: 0.9;
            background-color: hotpink;
        }
        body{
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            padding-top: 50px;
        }
        h2{
            color: hotpink;
        }
        h2:hover{
            color: red;
        }
    </style>
</head>

</html>

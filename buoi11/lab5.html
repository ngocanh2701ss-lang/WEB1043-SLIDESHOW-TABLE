<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 1 lab 5</title>
</head>
<body>
    
    <label id="pro" data-price="2000">I phone 17 pro max</label>
    <input id="qty" type="number" min="0">
    <button onclick="hienThi()">OK</button>
    <hr>

    <h3>Name: <span id="name">?</span></h3>
    <h3>Amount: <span id="amount">?</span></h3>

<script>
    function hienThi(){
        //Lấy tên sản phẩm
        var name=document.getElementById('pro').innerText;
        //Lấy số lượng 
        var qty=document.getElementById('qty').value

        //Lấy giá sản phẩm
        var price=document.getElementById('pro').getAttribute('data-price')


        //tính tiền
        var total=qty*price

        //tính tổng, in kết quả
        document.getElementById('name').innerText=name
        document.getElementById('amount').innerText=total + "$"

    }
</script>
</body>
</html>

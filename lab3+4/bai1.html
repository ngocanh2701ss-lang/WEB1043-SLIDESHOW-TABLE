<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--Bai 1: chia het cho 3-->
    <script>
        let x = prompt("Nhập số x: ");
        x = Number(x);

        let sum = 0;

        for(let i = 1; i <= x; i++){
            if(i % 3 === 0){
                sum += i;
            }
        }
        alert("Tổng là: " + sum);
    </script>
</body>
</html>
